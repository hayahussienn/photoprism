name: "CodeQL"

on:
  push:
    branches:
      - develop
      - feature/convert-black-white
  pull_request:
    branches:
      - develop  # ✅ Ensures CodeQL runs on PRs to develop
  schedule:
    - cron: '0 0 * * 1'  # ✅ Runs every Monday at midnight UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # ✅ Required to upload results to the Security tab

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go', 'javascript' ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"  # ✅ Ensures results are correctly categorized
