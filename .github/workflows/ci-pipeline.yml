name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - feature/convert-black-white

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v4
        with:
          go-version: 1.21  # Use the correct Go version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          go mod tidy
          cd frontend && npm install

      - name: Build Docker Image & Run Tests
        run: docker build -t hayahussienn/photoprism-app .  # Tests run inside Dockerfile now

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to DockerHub
        run: |
          docker tag hayahussienn/photoprism-app hayahussienn/photoprism-app:${{ github.run_number }}
          docker push hayahussienn/photoprism-app:${{ github.run_number }}
