name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - feature/convert-black-white

jobs:
  build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Go Dependencies
        run: go mod tidy

      - name: Install JavaScript Dependencies
        run: cd frontend && npm install

      - name: Run Go Tests
        run: go test ./internal/... -v

      - name: Run JavaScript Tests
        run: cd frontend && npm run test

      - name: Lint Go Code
        run: go vet ./...

      - name: Lint JavaScript Code
        run: cd frontend && npx eslint . --fix

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t YOUR_DOCKERHUB_USERNAME/photoprism-app:latest .

      - name: Push Docker Image to DockerHub
        run: |
          docker tag YOUR_DOCKERHUB_USERNAME/photoprism-app:latest YOUR_DOCKERHUB_USERNAME/photoprism-app:${{ github.run_number }}
          docker push YOUR_DOCKERHUB_USERNAME/photoprism-app:${{ github.run_number }}
