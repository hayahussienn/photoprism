name: Unittests and Checkstyle

on:
  push:
    branches:
      - develop
      - feature/convert-black-white

jobs:
  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Allow workflow to continue even if linting fails

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Go linting
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
          golangci-lint --version

      - name: Run Go Lint
        run: |
          golangci-lint run ./... --timeout=5m

      # JavaScript linting
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true  # Continue even if there are lint errors

      - name: Run Prettier
        run: |
          cd frontend
          npx prettier --check . || true  # Continue even if there are formatting issues

  build:
    runs-on: ubuntu-latest
    needs: lint  # This ensures linting runs before building

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Chrome  # ✅ Fix for missing Chrome in CI
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Print Node.js and NPM versions  # ✅ Debugging step
        run: |
          node -v
          npm -v

      - name: Install Dependencies  # ✅ Ensure clean install
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install

      - name: Run JavaScript Tests
        run: |
          make test-js || true

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Version
        run: echo "VERSION=0.0.2" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: hayahussienn/photoprism-app:${{ env.VERSION }}